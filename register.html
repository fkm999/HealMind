<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<!-- NAVBAR -->
<div class="navbar">
    <div class="nav-left">
        {% if user %}
            <span>Welcome, {{ user }}</span>
        {% endif %}
    </div>

    <div class="nav-center">
        <a href="/" class="logo">HealMind</a>
    </div>

    <div class="nav-right">
        <a href="/">Home</a>
        <a href="/ai">AI</a>
        <a href="/account">Account</a>
    </div>
</div>

<div class="auth-container">

    <div class="auth-card big">
        <h2>Create your account</h2>

        <form method="POST" action="/register">

            <label>Full Name</label>
            <input type="text" name="name" placeholder="Jimmy Butler" required>

            <label>Email Address</label>
            <input type="email" name="email" placeholder="you@example.com" required>

            <label>Password</label>
            <div class="form-group password-group">
                <input type="password" name="password" id="regPassword" placeholder="Create a password" required>
                <i data-lucide="eye" class="eye-icon" onclick="togglePassword('regPassword', this)"></i>
            </div>

            <label>Confirm Password</label>
            <div class="form-group password-group">
                <input type="password" name="confirm_password" id="regConfirm" placeholder="Confirm your password" required>
                <i data-lucide="eye" class="eye-icon" onclick="togglePassword('regConfirm', this)"></i>
            </div>

            <button type="submit">Create Account</button>
            <p class="auth-switch">
            Already have an account? <a href="/login">Login</a>
            </p>

        </form>
    </div>

</div>

<script>
function togglePassword(id, icon) {
    const input = document.getElementById(id);

    if (input.type === "password") {
        input.type = "text";
        icon.setAttribute("data-lucide", "eye-off");
    } else {
        input.type = "password";
        icon.setAttribute("data-lucide", "eye");
    }

    lucide.createIcons({
        attrs: {
            class: "eye-icon"
        }
    });
}
</script>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
  lucide.createIcons();
</script>

</body>
</html>
